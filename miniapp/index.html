<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Подключить VPN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; overflow: hidden; }
.bg-canvas { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
.floating-word { position: absolute; font-weight: 900; text-transform: uppercase; opacity: 0; animation: floatUp linear infinite; pointer-events: none; user-select: none; background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
@keyframes floatUp { 0%{opacity:0;transform:translateY(0)} 10%{opacity:1} 80%{opacity:.6} 100%{opacity:0;transform:translateY(-110vh)} }
.content { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; }
.card { background: rgba(20,20,30,.92); backdrop-filter: blur(20px); border-radius: 24px 24px 0 0; padding: 28px 20px 24px; border-top: 1px solid rgba(255,255,255,.08); }
.card h2 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px; line-height: 1.3; }
.card p { font-size: 14px; color: rgba(255,255,255,.5); text-align: center; margin-bottom: 20px; }
.device-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
.other-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; background: transparent; border: none; color: #4da8ff; font-size: 14px; cursor: pointer; margin-bottom: 16px; }
.other-devices { display: none; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
.other-devices.open { display: flex; }
.other-device-chip { padding: 10px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.05); color: #fff; font-size: 14px; cursor: pointer; }
.status-bar { background: rgba(255,215,0,.08); border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.status-text { flex: 1; }
.progress-bar { height: 4px; background: rgba(255,255,255,.1); border-radius: 4px; margin-top: 5px; }
.progress-fill { height: 100%; background: #4dd67e; border-radius: 4px; transition: width .6s; }
</style>
</head>
<body>
<div class="bg-canvas" id="bgCanvas"></div>
<div class="content">
  <div class="card">
    <h2>На каком устройстве<br>нужно настроить VPN?</h2>
    <p>Выберите своё устройство из списка ниже</p>
    <button class="device-btn" onclick="openSetup('ios')">📱 Телефон</button>
    <button class="device-btn" onclick="openSetup('windows')">💻 Компьютер</button>
    <button class="other-btn" onclick="toggleOther()">Другое устройство ▾</button>
    <div class="other-devices" id="otherDevices">
      <div class="other-device-chip" onclick="openSetup('macos')">🍎 macOS</div>
      <div class="other-device-chip" onclick="openSetup('android')">🤖 Android</div>
      <div class="other-device-chip" onclick="openSetup('linux')">🐧 Linux</div>
    </div>
    <div class="status-bar">
      <span style="font-size:20px">⭐</span>
      <div class="status-text">
        <div style="font-size:13px;color:rgba(255,255,255,.55)">Осталось:</div>
        <div style="font-size:16px;font-weight:700"><span id="daysLeft">...</span> дн.</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <span style="cursor:pointer;color:rgba(255,255,255,.4);font-size:18px" onclick="Telegram.WebApp.close()">✕</span>
    </div>
  </div>
</div>
<script>
const tg=window.Telegram.WebApp,p=new URLSearchParams(location.search);
tg.ready();tg.expand();
const days=parseInt(p.get('days')||'30'),max=parseInt(p.get('max')||'30');
document.getElementById('daysLeft').textContent=days;
setTimeout(()=>{document.getElementById('progressFill').style.width=Math.min(100,Math.round(days/max*100))+'%'},300);
const W=['Windows','Android','iOS','macOS','Linux'],c=document.getElementById('bgCanvas');
function sw(){const e=document.createElement('div');e.className='floating-word';e.textContent=W[Math.floor(Math.random()*W.length)];const s=[32,48,64,80,96][Math.floor(Math.random()*5)];e.style.cssText='font-size:'+s+'px;left:'+Math.random()*90+'%;bottom:-'+(s+20)+'px;animation-duration:'+(6+Math.random()*8)+'s';c.appendChild(e);setTimeout(()=>e.remove(),14000);}
for(let i=0;i<4;i++)setTimeout(sw,i*600);setInterval(sw,1200);
function openSetup(d){tg.openLink('https://tmgjwwyt5h-debug.github.io/vpn-bot-web/setup?device='+d+'&temporary_token='+encodeURIComponent(p.get('token')||'')+'&supportUrl='+encodeURIComponent(p.get('support')||''));}
function toggleOther(){document.getElementById('otherDevices').classList.toggle('open');}
</script>
</body>
</html>
